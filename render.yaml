# Render service descriptor for the FastAPI inference service.
# Push to main → Render rebuilds this service from ./ml/Dockerfile.
#
# DETECTION_SERVICE_TOKEN must match the value set in Vercel exactly,
# or the bearer-token check in ml/server.py rejects every request.

services:
  - type: web
    name: warehouse-detection
    runtime: docker
    dockerfilePath: ./ml/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DETECTION_SERVICE_TOKEN
        sync: false
      - key: MOCK_MODE
        value: "false"  # best.pt is in Supabase Storage; serve real inference.
                        # Override to "true" in the Render dashboard if you
                        # ever need to run the demo without a model.
      - key: MODEL_BUCKET
        value: "models"
      - key: MODEL_OBJECT
        value: "best.pt"
      - key: DETECT_CONF
        value: "0.25"   # YOLO inference threshold. The current model was
                        # trained for DETECT_CONF=0.10 (mAP <=0.5 per
                        # commit 07e268c) and goes silent at 0.5. 0.25 is
                        # Ultralytics' default and lets weaker-but-real
                        # detections through; the dashboard's display filter
                        # (lib/classes.ts:MIN_CONFIDENCE) stacks on top.
